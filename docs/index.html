<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Page - Ms Wang</title>
    <style>
        :root {
            --primary-color: #345499;
            --text-dark: #1f2937;
            --text-light: #9376a6;
            --bg-color: #dfd5e6;
            --card-bg: #ffffff;
            --accent-color: #ff6b6b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        
        body { background-color: var(--bg-color); color: var(--text-dark); line-height: 1.6; padding: 20px; }
        
        /* === Timer & Settings Panel Styles === */
        .timer-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 12px;
            max-width: 600px;
            margin: 0 auto 30px auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .timer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .timer-title { font-size: 1rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; opacity: 0.9; }
        
        .timer-display { font-size: 3rem; font-weight: 800; font-variant-numeric: tabular-nums; text-align: center; margin: 10px 0; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
        .timer-status { text-align: center; font-size: 0.9rem; opacity: 0.9; margin-bottom: 20px; }

        /* Settings Form Area */
        .settings-panel {
            background: rgba(255, 255, 255, 0.15);
            padding: 15px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
        }
        .form-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        .form-group { flex: 1; min-width: 100px; display: flex; flex-direction: column; }
        .form-group label { font-size: 0.75rem; margin-bottom: 4px; opacity: 0.8; font-weight: 600; }
        
        .form-input {
            background: rgba(255, 255, 255, 0.95);
            border: none;
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 1rem;
            color: #333;
            width: 100%;
            font-weight: bold;
        }
        
        .btn-group { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
            flex: 1;
            text-align: center;
        }
        .btn-save { background: #4ade80; color: #064e3b; }
        .btn-save:hover { background: #22c55e; transform: translateY(-1px); }
        
        .btn-perm { background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.4); }
        .btn-perm:hover { background: rgba(255,255,255,0.3); }

        /* Responsive */
        @media (max-width: 600px) {
            .timer-display { font-size: 2.2rem; }
            .form-row { flex-direction: column; }
            .form-group { min-width: 100%; }
        }
    </style>
</head>
<body>

    <!-- === Countdown & Settings Panel === -->
    <div id="notification-timer" class="timer-box">
        <div class="timer-header">
            <span class="timer-title">⏰ DW German Learning Reminder</span>
        </div>
        
        <div class="timer-display" id="countdown">--:--:--</div>
        <div class="timer-status" id="timer-status">Initializing...</div>

        <!-- Settings Form (Time Only) -->
        <div class="settings-panel">
            <div style="margin-bottom: 10px; font-size: 0.85rem; opacity: 0.9;">
                Set your daily reminder time:
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Hour (0-23)</label>
                    <input type="number" id="input-hour" class="form-input" min="0" max="23" placeholder="HH">
                </div>
                <div class="form-group">
                    <label>Minute (0-59)</label>
                    <input type="number" id="input-minute" class="form-input" min="0" max="59" placeholder="MM">
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-save" onclick="saveSettings()">💾 Save & Reset Timer</button>
                <button class="btn btn-perm" onclick="requestNotificationPermission()">🔔 Enable Notifications</button>
            </div>
        </div>
    </div>

    <!-- 引入 Leaflet (保持原有地图功能，如果需要) -->
    <!-- 如果不需要地图，可以删除下面两行 -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <script>
        // ==========================================
        // 1. Configuration (Fixed Content)
        // ==========================================
        
        // 🛑 MODIFY THESE VALUES TO CHANGE THE FIXED MESSAGE
        const FIXED_CONFIG = {
            title: "⏰ Time for DW German",
            body: "Keep learning! https://learngerman.dw.com/de/deutsch-lernen/s-9095"
        };

        let nextTargetTime = null;
        let timerInterval = null;
        
        // Default time settings (if no local storage)
        const defaultTimeConfig = {
            hour: 19,
            minute: 46
        };

        // Current active configuration
        let currentTimeConfig = { ...defaultTimeConfig };

        // ==========================================
        // 2. Local Storage Management
        // ==========================================
        function loadSettings() {
            const saved = localStorage.getItem('wangReminderTimeOnly');
            if (saved) {
                try {
                    currentTimeConfig = JSON.parse(saved);
                } catch (e) {
                    console.error("Failed to load settings", e);
                    currentTimeConfig = { ...defaultTimeConfig };
                }
            } else {
                // First visit: Set to 2 minutes from now for easy testing
                const now = new Date();
                currentTimeConfig.hour = now.getHours();
                currentTimeConfig.minute = now.getMinutes() + 2;
                if (currentTimeConfig.minute >= 60) {
                    currentTimeConfig.hour = (currentTimeConfig.hour + 1) % 24;
                    currentTimeConfig.minute = 0;
                }
            }
            updateInputFields();
        }

        function saveSettings() {
            const h = parseInt(document.getElementById('input-hour').value);
            const m = parseInt(document.getElementById('input-minute').value);

            if (isNaN(h) || h < 0 || h > 23) { 
                alert("Please enter a valid hour (0-23)"); 
                return; 
            }
            if (isNaN(m) || m < 0 || m > 59) { 
                alert("Please enter a valid minute (0-59)"); 
                return; 
            }

            // Save only time, content is fixed
            currentTimeConfig = { hour: h, minute: m };
            localStorage.setItem('wangReminderTimeOnly', JSON.stringify(currentTimeConfig));
            
            // Reset timer immediately
            nextTargetTime = calculateNextTarget();
            updateCountdown();
            
            alert("✅ Settings Saved! Countdown updated.");
        }

        function updateInputFields() {
            document.getElementById('input-hour').value = currentTimeConfig.hour;
            document.getElementById('input-minute').value = currentTimeConfig.minute;
        }

        // ==========================================
        // 3. Countdown Logic
        // ==========================================
        
        function calculateNextTarget() {
            const now = new Date();
            const target = new Date();
            
            target.setHours(currentTimeConfig.hour, currentTimeConfig.minute, 0, 0);

            // If today's time has passed, set target to tomorrow
            if (now >= target) {
                target.setDate(target.getDate() + 1);
            }
            return target;
        }

        function updateCountdown() {
            const now = new Date();
            if (!nextTargetTime) nextTargetTime = calculateNextTarget();
            
            const diff = nextTargetTime - now;

            if (diff <= 0) {
                sendNotification();
                nextTargetTime = calculateNextTarget();
                return; 
            }

            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            const hStr = hours.toString().padStart(2, '0');
            const mStr = minutes.toString().padStart(2, '0');
            const sStr = seconds.toString().padStart(2, '0');

            document.getElementById('countdown').textContent = `${hStr}:${mStr}:${sStr}`;
            
            const dateStr = nextTargetTime.toLocaleDateString(undefined, { month: 'short', day: 'numeric', weekday: 'short' });
            const timeStr = nextTargetTime.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
            document.getElementById('timer-status').textContent = `Next reminder: ${dateStr} at ${timeStr}`;
        }

        function startTimer() {
            updateCountdown();
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(updateCountdown, 1000);
        }

        // ==========================================
        // 4. Notification System
        // ==========================================
        
        function requestNotificationPermission() {
            if (!("Notification" in window)) {
                alert("Sorry, your browser does not support desktop notifications.");
                return;
            }

            if (Notification.permission === "granted") {
                new Notification("Test Successful", { body: "Notifications are ready!" });
                alert("Notifications enabled!");
            } else if (Notification.permission !== "denied") {
                Notification.requestPermission().then(function (permission) {
                    if (permission === "granted") {
                        new Notification("Welcome", { body: "Notifications are ready!" });
                        alert("Thanks for enabling notifications!");
                    } else {
                        alert("Permission denied. Please click the icon in the address bar to allow notifications.");
                    }
                });
            } else {
                alert("Notifications are blocked. Please enable them in your browser settings.");
            }
        }

        function sendNotification() {
            if (Notification.permission === "granted") {
                new Notification(FIXED_CONFIG.title, {
                    body: FIXED_CONFIG.body,
                    icon: "avatar.jpg", 
                    badge: "avatar.jpg",
                    requireInteraction: false
                });
            } else {
                alert(FIXED_CONFIG.title + "\n" + FIXED_CONFIG.body);
            }
            
            nextTargetTime = calculateNextTarget();
        }

        // ==========================================
        // 5. Initialization
        // ==========================================
        window.addEventListener('load', () => {
            loadSettings();
            startTimer();
        });

    </script>
</body>
</html>
